# ------------------------------------------------------------------------------
# dproxy Configuration File (v3.0.0)
# ------------------------------------------------------------------------------
# This configuration file controls all aspects of the dproxy server, including
# network listeners, DoH path validation, TLS settings, caching behavior,
# prefetching, and advanced routing logic.
# ------------------------------------------------------------------------------

# --- Logging Configuration ---
logging:
  # Log Level: DEBUG, INFO, WARN, ERROR
  # Default: INFO
  level: "INFO"
  
  # Format: "text" (human readable) or "json" (structured)
  # Default: "text"
  format: "text"
  
  # Outputs: List of destinations. Options: "console", "file", "syslog"
  # Default: ["console"]
  outputs:
    - "console"
    # - "file"
    # - "syslog"

  # File configuration (only used if "file" is in outputs)
  file:
    path: "/var/log/dproxy.log"
    permissions: 0644

  # Syslog configuration (only used if "syslog" is in outputs)
  syslog:
    network: "udp"
    address: "127.0.0.1:514"
    tag: "dproxy"
    facility: 16 # Local0

# --- Server Configuration ---
server:
  # --- Listeners (NEW in v3.0) ---
  # Configure multiple listeners to bind specific protocols to specific addresses and ports.
  listeners:
    - address: "0.0.0.0"
      port: 53
      protocol: "dns"
    - address: "0.0.0.0"
      port: 853
      protocol: "dot"
    - address: "0.0.0.0"
      port: 443
      protocol: "https"

  # TLS Certificate settings.
  tls:
    cert_file: ""  # Path to your .crt or .pem file
    key_file: ""   # Path to your .key file
  
  # DoH (DNS over HTTPS) Configuration
  doh:
    allowed_paths:
      - "/dns-query"
    strict_path: true

  # EDNS0 Options Configuration
  edns0:
    ecs:
      mode: "add"
    mac:
      mode: "prefer-arp"
      source: "arp"

  timeout: "5s"
  insecure_upstream: false
  
  # Drop DropOnFailure: If true, the proxy drops the client query instead of sending SERVFAIL
  # when upstreams time out or fail. This forces the client to handle the timeout.
  # Default: false (send SERVFAIL)
  drop_on_failure: false

# --- ARP/NDP Configuration (NEW) ---
arp:
  # Mode: "both", "v4", "v6", "none"
  # - both: Maintain both ARP (IPv4) and NDP (IPv6) tables
  # - v4:   Only maintain ARP table
  # - v6:   Only maintain NDP table
  # - none: Disable ARP/NDP maintenance entirely
  mode: "both"
  
  # Timeout for system commands (e.g. 'ip neigh', 'arp -a')
  timeout: "2s"

# --- Bootstrap DNS Configuration ---
bootstrap:
  servers:
    - "1.1.1.1:53"
    - "8.8.8.8:53"
  ip_version: "both"

# --- Cache Configuration ---
cache:
  enabled: true
  size: 10000
  
  # TTL Management (in seconds)
  # 0 = Disabled (use upstream TTL)
  min_ttl: 60       # Minimum TTL for successful responses (NOERROR)
  max_ttl: 3600     # Maximum TTL for successful responses
  min_neg_ttl: 10   # Minimum TTL for negative responses (NXDOMAIN, etc)

  prefetch:
    cross_fetch:
      enabled: false
      mode: "off"
    stale_refresh:
      enabled: false

# --- Routing Configuration ---
routing:
  upstream_groups:
    public_secure:
      - doh://cloudflare-dns.com/dns-query
      - dot://dns.google:853
    local_internal:
      - udp://192.168.1.1:53

  routing_rules:
    # Example: Blocklist using a HOSTS file AND online list
    # Queries matching entries in these lists will be answered immediately.
    - name: "Blocklist"
      match:
        query_domain:
          - "*.ads.example.com"
          - "*.tracker.com"
      upstreams: public_secure
      hosts_files:
        - "/etc/blocked.hosts"
      hosts_urls:
        - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
      hosts_wildcard: true
      hosts_optimize: false # Optional: Set to true to remove redundant subdomains (default: false)

    # Example: Local Development Override
    # Check /etc/hosts for local overrides first, then go to internal DNS.
    - name: "Local Dev"
      match:
        query_domain: ".dev.local"
      upstreams: local_internal
      strategy: failover
      hosts_files:
        - "/etc/hosts"
      hosts_wildcard: false

  # 3. Default Rule (REQUIRED)
  # This rule is applied if no other rules match.
  default:
    upstreams: public_secure
    strategy: failover
    # Global HOSTS check for all other queries
    hosts_files:
      - "/etc/hosts"
    hosts_wildcard: false

