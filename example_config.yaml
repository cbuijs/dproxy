# ------------------------------------------------------------------------------
# dproxy Configuration File (v3.0.0)
# ------------------------------------------------------------------------------
# This configuration file controls all aspects of the dproxy server, including
# network listeners, security settings, caching behavior, prefetching, 
# traffic routing, and hardware address integration.
# ------------------------------------------------------------------------------

# --- Logging Configuration ---
logging:
  # Log Level: DEBUG, INFO, WARN, ERROR
  # Default: INFO
  level: "INFO"
  
  # Format: "text" (human readable) or "json" (structured for parsing)
  # Default: "text"
  # Note: "json" format ONLY applies to File output. Console and Syslog will always use Text.
  format: "text"
  
  # Outputs: List of destinations. Options: "console", "file", "syslog"
  # Default: ["console"]
  outputs:
    - "console"
    # - "file"
    # - "syslog"

  # File configuration (only used if "file" is in outputs)
  file:
    path: "/var/log/dproxy.log"
    permissions: 0644

  # Syslog configuration (only used if "syslog" is in outputs)
  syslog:
    network: "udp"
    address: "127.0.0.1:514"
    tag: "dproxy"
    facility: 16

# --- Server Configuration ---
server:
  # --- Listeners (Recommended) ---
  listeners:
    # Public Interface - Standard DNS
    - address: "0.0.0.0"
      port: 53
      protocol: "udp"
    - address: "0.0.0.0"
      port: 53
      protocol: "tcp"
    
    # Public Interface - Encrypted DNS
    - address: "0.0.0.0"
      port: 853
      protocol: "dot"
    - address: "0.0.0.0"
      port: 443
      protocol: "https"

  # TLS Certificate settings (Required for DoT, DoQ, DoH, HTTPS)
  tls:
    cert_file: ""
    key_file: ""
  
  # Log Client Name: If true, attempts to resolve client IPs to names using 
  # local hosts files for logging purposes. (Useful for LANs)
  log_client_name: true

  # DDR (Discovery of Designated Resolvers) - RFC 9462
  ddr:
    enabled: true
    # host_name: "dns.server.com"

  # DoH (DNS over HTTPS) Specific Settings
  doh:
    allowed_paths:
      - "/dns-query"
    strict_path: true

  # EDNS0 (Extension Mechanisms for DNS) Options
  edns0:
    ecs:
      mode: "add"
      ipv4_mask: 32
      ipv6_mask: 128
    mac:
      mode: "prefer-arp"
      source: "arp"

  timeout: "5s"
  insecure_upstream: false
  drop_on_failure: false

  # Response Manipulation
  response:
    minimization: false
    cname_flattening: false

# --- ARP/NDP Configuration ---
arp:
  mode: "both"
  timeout: "2s"

# --- Bootstrap DNS Configuration ---
bootstrap:
  servers:
    - "1.1.1.1:53"
    - "8.8.8.8:53"
  ip_version: "both"

# --- Cache Configuration ---
cache:
  enabled: true
  size: 10000 
  
  # Disk Cache: Directory to store binary cache of processed hosts/blocklists.
  # Speeds up startup significantly for large blocklists.
  hosts_cache_dir: "/var/cache/dproxy"

  min_ttl: 60       
  max_ttl: 3600     
  min_neg_ttl: 10   
  max_neg_ttl: 60   
  hosts_ttl: 300
  ttl_strategy: "none"
  response_sorting: "none"

  # Prefetch Configuration
  prefetch:
    cross_fetch:
      enabled: false
      mode: "off"
      fetch_types: ["A", "AAAA", "HTTPS"]
      max_concurrent: 10
      timeout: "3s"
    
    stale_refresh:
      enabled: false
      threshold_percent: 10
      min_hits: 2
      check_interval: "30s"

# --- Routing Configuration ---
routing:
  # Define reusable groups of upstream servers
  upstream_groups:
    public_secure:
      - doh://cloudflare-dns.com/dns-query
      - dot://dns.google:853
    local_internal:
      - udp://192.168.1.1:53

  # Routing Rules (Processed in order)
  routing_rules:
    # Example 1: Blocklist (Ads/Trackers)
    - name: "Blocklist"
      match:
        query_domain:
          - "*.ads.example.com"
      upstreams: public_secure
      hosts_files:
        - "/etc/blocked.hosts"
      hosts_urls:
        - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
      hosts_wildcard: true
      hosts_optimize: true
      # Refresh interval for this specific rule's hosts
      refresh_interval: "24h"

    # Example 2: MAC Wildcards (Privacy/Randomized MACs)
    # Matches MACs where the second char is '2', '6', 'A', or 'E' (locally administered)
    # Or simple patterns like "00:11:*:*:*:*"
    - name: "Randomized MACs"
      match:
        client_mac: 
          - "?2:*:*:*:*:*"
          - "?6:*:*:*:*:*"
          - "?a:*:*:*:*:*"
          - "?e:*:*:*:*:*"
      upstreams: public_secure
      strategy: random

    # Example 3: Local Development
    - name: "Local Dev"
      match:
        query_domain: ".dev.local"
      upstreams: local_internal
      hosts_files:
        - "/etc/hosts.dev"
      refresh_interval: "30s"

  # Default Rule (REQUIRED)
  default:
    upstreams: public_secure
    strategy: failover
    hosts_files:
      - "/etc/hosts"
    refresh_interval: "1h"

