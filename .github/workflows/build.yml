name: Build dproxy

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/*.yml' # Added so the workflow triggers when you commit this file
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/*.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Windows (AMD64)
          - goos: windows
            goarch: amd64
            output: dproxy-windows-amd64.exe
          
          # Linux (AMD64 & ARM64)
          - goos: linux
            goarch: amd64
            output: dproxy-linux-amd64
          - goos: linux
            goarch: arm64
            output: dproxy-linux-arm64
            
          # macOS (Intel & Apple Silicon)
          - goos: darwin
            goarch: amd64
            output: dproxy-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: dproxy-darwin-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        check-latest: true

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        echo "Building for $GOOS/$GOARCH..."
        # -trimpath: Removes file system paths from executable (security/reproducibility)
        # -s -w: Strips debug information to reduce binary size
        go build -v -trimpath -ldflags="-s -w" -o build/${{ matrix.output }} .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output }}
        path: build/${{ matrix.output }}
        if-no-files-found: error
        retention-days: 5

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true

